<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decorative css</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <section class="main-section">
            <h2 class="main-section-title">1. Element shadow</h2>
            <div class="example-row">
                <div class="example-box shadow-basic">Shadow basic</div>
                <div class="example-box shadow-blur">Shadow blur</div>
                <div class="example-box shadow-multiple">Shadow multiple</div>
            </div>
        </section>

        <section class="main-section">
            <h2 class="main-section-title">2. text shadow</h2>
            <div class="example-row">
                <div class="example-box shadow-basic-text">Shadow basic-text</div>
                <div class="example-box shadow-glow-text">Shadow glow-text</div>
                
            </div>
        </section>

        <section class="main-section">
            <h2 class="main-section-title">3. Element shadow</h2>
            <div class="example-row">
                <div class="example-box border-radius">Border radius</div>
                <div class="example-box border-image">Border image</div>
                <div class="example-box border-outline">Border outline</div>
            </div>
        </section>

        <section class="main-section">
            <h2 class="main-section-title">4. Filter</h2>
            <div class="example-row">
                <div class="example-box blur-filter">Blur filter</div>

            </div>
        </section>
    </div>
</body>
</html>
